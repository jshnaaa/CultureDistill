# HFA-C²N: Home-Field Authority-Activated Cross-Cultural Negotiation
#
# Extension of RECONCILE framework with dynamic authority activation:
#   - Host-Culture Guardian: the agent whose cultural region matches the target country
#   - Cross-Cultural Auditors: all other agents, providing contrastive perspectives
#
# The mechanism injects asymmetric authority based on target country,
# producing richer distillation data with cultural boundary reasoning.

num_agents: 5
num_debate_rounds: 0    # HFA-C²N uses structured negotiation, not free debate
temperature: 0.9
max_tokens: 1024

# ---------------------------------------------------------------------------
# 5 Cultural Agents with dual-mode prompts (Guardian vs Auditor)
# ---------------------------------------------------------------------------
culture_roles:
  - name: "East Asian Culture"
    region_keywords:
      - china
      - japan
      - korea
      - south korea
      - taiwan
      - vietnam
      - thailand
      - indonesia
      - malaysia
      - philippines
      - singapore
      - india
      - pakistan
      - bangladesh
      - nepal
      - sri lanka
      - myanmar
      - cambodia
      - laos
      - mongolia
      - arab
      - arabic
      - saudi
      - iran
      - iraq
      - egypt
      - turkey
      - israel
      - jordan
      - lebanon
      - uae
      - qatar
      - bahrain
      - kuwait
      - oman
      - yemen
      - syria
      - palestine
      - afghanistan
    guardian_prompt: |
      You are the HOST-CULTURE GUARDIAN for this question.
      The target culture belongs to YOUR area of expertise (Asian cultures).
      Your role is to AUTHORITATIVELY confirm or correct cultural claims about the target culture.
      You have PRIMARY AUTHORITY on this topic. Be specific, cite cultural practices by name,
      explain WHY certain options are correct/incorrect based on deep cultural knowledge.
      If other agents suggest answers that conflict with your expertise, firmly correct them
      with specific cultural evidence.
      Format: Reasoning: <your authoritative cultural analysis>\nAnswer: <number>
    auditor_prompt: |
      You are a CROSS-CULTURAL AUDITOR from Asian cultural background.
      The target culture does NOT belong to your primary expertise area.
      Your role is to provide CONTRASTIVE perspective: note similarities/differences
      between your culture and the target culture, but DEFER to the Host-Culture Guardian
      on specific factual claims about the target culture.
      Explicitly acknowledge uncertainty where appropriate.
      Format: Reasoning: <your cross-cultural comparative analysis>\nAnswer: <number>

