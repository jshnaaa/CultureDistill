# HF-CAC Configuration for CultureAtlas Dataset
#
# CultureAtlas task: Given a question about a country's culture and two candidate
# responses, determine which response demonstrates MORE culturally specific and
# insightful knowledge. This is a BINARY COMPARISON task (answer 1 or 2), NOT
# a behavior acceptability judgment.
#
# Key differences from NormAD:
#   - NormAD: "Is this behavior acceptable?" → 1/2/3 (accept/reject/neutral)
#   - CultureAtlas: "Which response is more culturally specific?" → 1/2 (comparative)
#
# The Guardian/Auditor mechanism still applies: the agent whose cultural expertise
# matches the target country can better judge which response contains deeper,
# more authentic cultural knowledge vs. surface-level generalizations.

num_agents: 6
num_debate_rounds: 0    # HF-CAC uses structured negotiation, not free debate
temperature: 0.9
max_tokens: 1024

# ---------------------------------------------------------------------------
# Cultural Affinity Matrix (6x6) — same as NormAD config
# ---------------------------------------------------------------------------
cultural_affinity_matrix:
  - [1.0, 0.4, 0.1, 0.2, 0.2, 0.1]   # Western & Anglo-Saxon
  - [0.4, 1.0, 0.3, 0.1, 0.2, 0.2]   # Latin American
  - [0.1, 0.3, 1.0, 0.1, 0.5, 0.2]   # Sub-Saharan African
  - [0.2, 0.1, 0.1, 1.0, 0.2, 0.5]   # East-Asian
  - [0.2, 0.2, 0.5, 0.2, 1.0, 0.4]   # Islamic & Middle-Eastern
  - [0.1, 0.2, 0.2, 0.5, 0.4, 1.0]   # South & Southeast Asian

guardian_failure_indicators:
  - "I'm not sure"
  - "I don't have enough knowledge"
  - "I cannot determine"
  - "I lack sufficient"
  - "uncertain about this"
  - "not familiar with"

# ---------------------------------------------------------------------------
# Task type identifier (used by hf_cac_mas.py to adapt prompt building)
# ---------------------------------------------------------------------------
task_type: "cultureatlas"
answer_choices: [1, 2]

# ---------------------------------------------------------------------------
# 6 Heterogeneous Cultural Agents — CultureAtlas variant
# Guardian: judge which response shows deeper knowledge of YOUR culture
# Auditor: provide contrastive perspective on cultural specificity
# ---------------------------------------------------------------------------
culture_roles:
  - name: "Western & Anglo-Saxon Culture"
    region_keywords:
      - united states
      - usa
      - america
      - american
      - canada
      - australia
      - new zealand
      - uk
      - united kingdom
      - britain
      - england
      - scotland
      - ireland
      - france
      - germany
      - netherlands
      - spain
      - italy
      - portugal
      - sweden
      - norway
      - denmark
      - finland
      - poland
      - greece
      - austria
      - switzerland
      - belgium
      - czech
      - hungary
      - romania
      - ukraine
      - russia
      - croatia
      - serbia
      - bulgaria
    guardian_prompt: |
      You are the HOST-CULTURE GUARDIAN for this question.
      The target culture belongs to YOUR area of expertise (Western & Anglo-Saxon cultures).
      Your cognitive foundation: You are deeply versed in English-speaking nations and
      secular holidays derived from Christian traditions (Thanksgiving, Christmas, National Days),
      individualism, low power-distance social etiquette, and legal norms prevalent in
      North America, Australia/Oceania, and Western Europe.

      TASK: You will be given a question about the target country's culture and TWO candidate
      responses. Your job is to determine which response demonstrates MORE culturally specific
      and insightful knowledge — i.e., which one reflects deeper understanding of unique
      traditions, lesser-known practices, or nuanced cultural significance, versus being
      more generic or surface-level.

      As the Host-Culture Guardian, you have PRIMARY AUTHORITY to judge cultural depth and
      authenticity for this target culture. Use your deep knowledge to identify:
      - Which response mentions specific cultural practices, traditions, or terms by name
      - Which response captures nuanced cultural significance vs. stating obvious facts
      - Which response reflects insider knowledge vs. outsider generalizations

      Format: Reasoning: <your authoritative analysis of which response shows deeper cultural knowledge>\nAnswer: <1 or 2>
    auditor_prompt: |
      You are a CROSS-CULTURAL AUDITOR from Western & Anglo-Saxon cultural background.
      Your cognitive foundation: English-speaking nations, Christian-derived secular holidays,
      individualism, low power-distance social norms.
      The target culture does NOT belong to your primary expertise area.

      TASK: You will be given a question about a country's culture and TWO candidate responses.
      Determine which response demonstrates MORE culturally specific and insightful knowledge.

      As a Cross-Cultural Auditor:
      - Provide your comparative perspective on which response seems more culturally authentic
      - Note if either response contains patterns you recognize as generic/surface-level
      - DEFER to the Host-Culture Guardian on specific factual claims about the target culture
      - Explicitly acknowledge uncertainty where appropriate

      Format: Reasoning: <your cross-cultural comparative analysis>\nAnswer: <1 or 2>

