# HF-CAC Configuration for CulturalBench Dataset
#
# CulturalBench task: Multiple-choice cultural knowledge questions (4 options).
# Given a question about a specific country's culture with 4 candidate answers,
# select the correct one. This is a 4-WAY SELECTION task (answer 1/2/3/4).
#
# Key differences from NormAD and CultureAtlas:
#   - NormAD: "Is this behavior acceptable?" → 1/2/3 (accept/reject/neutral)
#   - CultureAtlas: "Which response is more culturally specific?" → 1/2 (comparative)
#   - CulturalBench: "Which option correctly answers the cultural question?" → 1/2/3/4 (knowledge QA)
#
# DESIGN NOTES FOR CULTURALBENCH:
#   Unlike NormAD (subjective judgment), CulturalBench is FACTUAL KNOWLEDGE QA.
#   The multi-agent system should leverage INDEPENDENT reasoning from multiple
#   perspectives rather than authority-based deference. Each agent reasons
#   independently, and the Judge synthesizes based on evidence quality.

num_agents: 6
num_debate_rounds: 0    # HF-CAC uses structured negotiation, not free debate
temperature: 0.9
max_tokens: 1024

# ---------------------------------------------------------------------------
# Cultural Affinity Matrix (6x6) — same as other configs
# ---------------------------------------------------------------------------
cultural_affinity_matrix:
  - [1.0, 0.4, 0.1, 0.2, 0.2, 0.1]   # Western & Anglo-Saxon
  - [0.4, 1.0, 0.3, 0.1, 0.2, 0.2]   # Latin American
  - [0.1, 0.3, 1.0, 0.1, 0.5, 0.2]   # Sub-Saharan African
  - [0.2, 0.1, 0.1, 1.0, 0.2, 0.5]   # East-Asian
  - [0.2, 0.2, 0.5, 0.2, 1.0, 0.4]   # Islamic & Middle-Eastern
  - [0.1, 0.2, 0.2, 0.5, 0.4, 1.0]   # South & Southeast Asian

guardian_failure_indicators:
  - "I'm not sure"
  - "I don't have enough knowledge"
  - "I cannot determine"
  - "I lack sufficient"
  - "uncertain about this"
  - "not familiar with"

# ---------------------------------------------------------------------------
# Task type identifier (used by hf_cac_mas.py to adapt prompt building)
# ---------------------------------------------------------------------------
task_type: "culturalbench"
answer_choices: [1, 2, 3, 4]

# ---------------------------------------------------------------------------
# 6 Heterogeneous Cultural Agents — CulturalBench variant
#
# KEY CHANGE: For factual knowledge QA, we reduce authority rhetoric and
# encourage DIRECT, CONCISE answers. Over-analysis leads to wrong answers.
# Guardian provides informed perspective; Auditors reason INDEPENDENTLY.
# ---------------------------------------------------------------------------
culture_roles:
  - name: "Western & Anglo-Saxon Culture"
    region_keywords:
      - united states
      - usa
      - america
      - american
      - canada
      - australia
      - new zealand
      - uk
      - united kingdom
      - britain
      - england
      - scotland
      - ireland
      - france
      - germany
      - netherlands
      - spain
      - italy
      - portugal
      - sweden
      - norway
      - denmark
      - finland
      - poland
      - greece
      - austria
      - switzerland
      - belgium
      - czech
      - hungary
      - romania
      - ukraine
      - russia
      - croatia
      - serbia
      - bulgaria
    guardian_prompt: |
      You are a cultural knowledge expert specializing in Western & Anglo-Saxon cultures.
      You are deeply knowledgeable about English-speaking nations, Western European countries,
      secular holidays, social etiquette, tipping culture, greetings, dining customs, and
      everyday practices in North America, Australia/Oceania, and Western Europe.

      TASK: Answer the multiple-choice question about the target country's culture.
      Read the question carefully — pay attention to what EXACTLY is being asked
      (e.g., "uncommon", "common", "not typical", "traditional").

      IMPORTANT GUIDELINES:
      - Be DIRECT. Pick the answer that most accurately matches factual cultural knowledge.
      - Do NOT over-analyze or second-guess obvious answers.
      - If the question asks about what is "uncommon" or "not typical", identify the practice
        that DOES NOT normally happen in that culture.
      - Keep reasoning brief and factual. Cite specific cultural norms.

      Format: Reasoning: <brief factual analysis>\nAnswer: <1, 2, 3, or 4>
    auditor_prompt: |
      You are a cultural knowledge analyst with expertise in Western & Anglo-Saxon cultures.
      You are being asked about a DIFFERENT culture's practices.

      TASK: Answer the multiple-choice question about the target country's culture.
      Think step by step:
      1. Read the question carefully — what exactly is being asked?
      2. Consider each option based on your general cultural knowledge.
      3. Select the most factually accurate answer.

      IMPORTANT: Reason INDEPENDENTLY. If you have relevant knowledge about the target
      culture, use it. Do not simply defer to others — your independent perspective
      adds value even when the target culture is not your specialty.

      Format: Reasoning: <your independent analysis>\nAnswer: <1, 2, 3, or 4>

