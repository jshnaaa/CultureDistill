# HF-CAC Configuration for CulturalBench Dataset
#
# CulturalBench task: Multiple-choice cultural knowledge questions (4 options).
# Simple factual knowledge QA — answer 1/2/3/4.
#
# DESIGN: Answer-first format. Agents output the number FIRST, then brief explanation.
# This prevents reasoning-answer mismatch (the #1 bug in previous runs).

num_agents: 6
num_debate_rounds: 0
temperature: 0.9
max_tokens: 128

# ---------------------------------------------------------------------------
# Cultural Affinity Matrix (6x6)
# ---------------------------------------------------------------------------
cultural_affinity_matrix:
  - [1.0, 0.4, 0.1, 0.2, 0.2, 0.1]   # Western & Anglo-Saxon
  - [0.4, 1.0, 0.3, 0.1, 0.2, 0.2]   # Latin American
  - [0.1, 0.3, 1.0, 0.1, 0.5, 0.2]   # Sub-Saharan African
  - [0.2, 0.1, 0.1, 1.0, 0.2, 0.5]   # East-Asian
  - [0.2, 0.2, 0.5, 0.2, 1.0, 0.4]   # Islamic & Middle-Eastern
  - [0.1, 0.2, 0.2, 0.5, 0.4, 1.0]   # South & Southeast Asian

guardian_failure_indicators:
  - "I'm not sure"
  - "I don't have enough knowledge"
  - "I cannot determine"
  - "I lack sufficient"
  - "uncertain about this"
  - "not familiar with"

# ---------------------------------------------------------------------------
# Task type identifier
# ---------------------------------------------------------------------------
task_type: "culturalbench"
answer_choices: [1, 2, 3, 4]

# ---------------------------------------------------------------------------
# 6 Heterogeneous Cultural Agents
#
# FORMAT: Answer first (single digit), then brief explanation.
# ---------------------------------------------------------------------------
culture_roles:
  - name: "Western & Anglo-Saxon Culture"
    region_keywords:
      - united states
      - usa
      - america
      - american
      - canada
      - australia
      - new zealand
      - uk
      - united kingdom
      - britain
      - england
      - scotland
      - ireland
      - france
      - germany
      - netherlands
      - spain
      - italy
      - portugal
      - sweden
      - norway
      - denmark
      - finland
      - poland
      - greece
      - austria
      - switzerland
      - belgium
      - czech
      - hungary
      - romania
      - ukraine
      - russia
      - croatia
      - serbia
      - bulgaria
    guardian_prompt: |
      You are the HOST-CULTURE GUARDIAN for this question.
      The target culture belongs to YOUR area of expertise (Western & Anglo-Saxon cultures).
      You have PRIMARY AUTHORITY on this topic. Be specific and cite cultural practices by name.
      CRITICAL LOGIC STEP: Before answering, parse the question structure:
      - If it contains "unusual", "uncommon", "NOT", "never", "least": you must select the OUTLIER option (the one that does NOT fit the culture).
      - If it contains "not uncommon" (double negation): this means COMMON, so select what IS common.
      - Restate in your own words what the question is looking for before answering.
      Then evaluate ALL four options independently. Do NOT default to any position.
      Answer format: first line is ONLY the number (1/2/3/4), second line is a brief explanation.
    auditor_prompt: |
      You are a CROSS-CULTURAL AUDITOR from Western & Anglo-Saxon cultural background.
      The target culture does NOT belong to your primary expertise area.
      YOUR TASK: Provide your OWN INDEPENDENT answer based on your knowledge.
      LOGIC STEP: First restate what the question is asking. If the question contains negations
      ("unusual", "NOT", "never", "least"), identify the OUTLIER that does not fit.
      You may consider the Guardian's perspective, but if your reasoning leads to a different
      answer, STATE YOUR OWN ANSWER with confidence. Do not simply defer.
      Evaluate ALL four options. Do NOT default to any position.
      Answer format: first line is ONLY the number (1/2/3/4), second line is a brief explanation.

