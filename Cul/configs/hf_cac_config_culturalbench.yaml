# HF-CAC Configuration for CulturalBench Dataset
#
# CulturalBench task: Multiple-choice cultural knowledge questions (4 options).
# Given a question about a specific country's culture with 4 candidate answers,
# select the correct one. This is a 4-WAY SELECTION task (answer 1/2/3/4).
#
# Key differences from NormAD and CultureAtlas:
#   - NormAD: "Is this behavior acceptable?" → 1/2/3 (accept/reject/neutral)
#   - CultureAtlas: "Which response is more culturally specific?" → 1/2 (comparative)
#   - CulturalBench: "Which option correctly answers the cultural question?" → 1/2/3/4 (knowledge QA)
#
# The Guardian/Auditor mechanism still applies: the agent whose cultural expertise
# matches the target country can better identify the correct answer from deep
# cultural knowledge, while Auditors provide cross-cultural reasoning perspectives.

num_agents: 6
num_debate_rounds: 0    # HF-CAC uses structured negotiation, not free debate
temperature: 0.9
max_tokens: 1024

# ---------------------------------------------------------------------------
# Cultural Affinity Matrix (6x6) — same as other configs
# ---------------------------------------------------------------------------
cultural_affinity_matrix:
  - [1.0, 0.4, 0.1, 0.2, 0.2, 0.1]   # Western & Anglo-Saxon
  - [0.4, 1.0, 0.3, 0.1, 0.2, 0.2]   # Latin American
  - [0.1, 0.3, 1.0, 0.1, 0.5, 0.2]   # Sub-Saharan African
  - [0.2, 0.1, 0.1, 1.0, 0.2, 0.5]   # East-Asian
  - [0.2, 0.2, 0.5, 0.2, 1.0, 0.4]   # Islamic & Middle-Eastern
  - [0.1, 0.2, 0.2, 0.5, 0.4, 1.0]   # South & Southeast Asian

guardian_failure_indicators:
  - "I'm not sure"
  - "I don't have enough knowledge"
  - "I cannot determine"
  - "I lack sufficient"
  - "uncertain about this"
  - "not familiar with"

# ---------------------------------------------------------------------------
# Task type identifier (used by hf_cac_mas.py to adapt prompt building)
# ---------------------------------------------------------------------------
task_type: "culturalbench"
answer_choices: [1, 2, 3, 4]

# ---------------------------------------------------------------------------
# 6 Heterogeneous Cultural Agents — CulturalBench variant
# Guardian: use deep cultural knowledge to identify the correct answer
# Auditor: provide cross-cultural reasoning perspective
# ---------------------------------------------------------------------------
culture_roles:
  - name: "Western & Anglo-Saxon Culture"
    region_keywords:
      - united states
      - usa
      - america
      - american
      - canada
      - australia
      - new zealand
      - uk
      - united kingdom
      - britain
      - england
      - scotland
      - ireland
      - france
      - germany
      - netherlands
      - spain
      - italy
      - portugal
      - sweden
      - norway
      - denmark
      - finland
      - poland
      - greece
      - austria
      - switzerland
      - belgium
      - czech
      - hungary
      - romania
      - ukraine
      - russia
      - croatia
      - serbia
      - bulgaria
    guardian_prompt: |
      You are the HOST-CULTURE GUARDIAN for this question.
      The target culture belongs to YOUR area of expertise (Western & Anglo-Saxon cultures).
      Your cognitive foundation: You are deeply versed in English-speaking nations and
      secular holidays derived from Christian traditions (Thanksgiving, Christmas, National Days),
      individualism, low power-distance social etiquette, and legal norms prevalent in
      North America, Australia/Oceania, and Western Europe.

      TASK: You will be given a multiple-choice cultural knowledge question about the target
      country with 4 options. Your job is to identify the CORRECT answer using your deep
      cultural expertise. Analyze each option carefully and explain why the correct answer
      is right and why the others are wrong based on specific cultural knowledge.

      As the Host-Culture Guardian, you have PRIMARY AUTHORITY on this topic. Use your deep
      knowledge to identify the correct answer with confidence. Cite specific cultural
      practices, traditions, or norms by name to justify your choice.

      Format: Reasoning: <your authoritative cultural analysis of each option>\nAnswer: <1, 2, 3, or 4>
    auditor_prompt: |
      You are a CROSS-CULTURAL AUDITOR from Western & Anglo-Saxon cultural background.
      Your cognitive foundation: English-speaking nations, Christian-derived secular holidays,
      individualism, low power-distance social norms.
      The target culture does NOT belong to your primary expertise area.

      TASK: You will be given a multiple-choice cultural knowledge question about a country
      with 4 options. Analyze the options and select the one you believe is correct.

      As a Cross-Cultural Auditor:
      - Provide your comparative perspective on which option seems most culturally accurate
      - Note if any options contain patterns you recognize from your own cultural knowledge
      - DEFER to the Host-Culture Guardian on specific factual claims about the target culture
      - Explicitly acknowledge uncertainty where appropriate

      Format: Reasoning: <your cross-cultural comparative analysis>\nAnswer: <1, 2, 3, or 4>

