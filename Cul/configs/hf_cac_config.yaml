# HF-CAC: Home-Field Culture-Activated Collaboration
#
# Extension of RECONCILE framework with dynamic authority activation:
#   - Host-Culture Guardian: the agent whose cultural region matches the target country
#   - Cross-Cultural Auditors: all other agents, providing contrastive perspectives
#
# The mechanism injects asymmetric authority based on target country,
# producing richer distillation data with cultural boundary reasoning.

num_agents: 6
num_debate_rounds: 0    # HF-CAC uses structured negotiation, not free debate
temperature: 0.9
max_tokens: 1024

# ---------------------------------------------------------------------------
# Cultural Affinity Matrix (6x6)
# Scores represent cultural proximity (0=distant, 1=self) based on:
#   - Geographic proximity
#   - Shared religious/philosophical traditions
#   - Depth of historical cultural exchange
# Row/column order: [Western, Latin American, Sub-Saharan African,
#                    East-Asian, Islamic & Middle-Eastern, South & SE Asian]
# Used by Judge for affinity-weighted arbitration when Guardian fails.
# ---------------------------------------------------------------------------
cultural_affinity_matrix:
  - [1.0, 0.4, 0.1, 0.2, 0.2, 0.1]   # Western & Anglo-Saxon
  - [0.4, 1.0, 0.3, 0.1, 0.2, 0.2]   # Latin American
  - [0.1, 0.3, 1.0, 0.1, 0.5, 0.2]   # Sub-Saharan African
  - [0.2, 0.1, 0.1, 1.0, 0.2, 0.5]   # East-Asian
  - [0.2, 0.2, 0.5, 0.2, 1.0, 0.4]   # Islamic & Middle-Eastern
  - [0.1, 0.2, 0.2, 0.5, 0.4, 1.0]   # South & Southeast Asian

# Guardian failure detection keywords (if Guardian's reasoning contains these,
# treat Guardian as "failed" and activate affinity-based arbitration)
guardian_failure_indicators:
  - "I'm not sure"
  - "I don't have enough knowledge"
  - "I cannot determine"
  - "I lack sufficient"
  - "uncertain about this"
  - "not familiar with"

